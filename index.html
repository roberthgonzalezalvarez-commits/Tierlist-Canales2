<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tier List de Canales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <header class="top-bar">
    <div class="top-bar-left">
      <h1>Tier List</h1>
      <select id="monthSelect">
        <option value="Enero">Enero</option>
        <option value="Febrero">Febrero</option>
        <option value="Marzo">Marzo</option>
        <option value="Abril" selected>Abril</option>
        <option value="Mayo">Mayo</option>
        <option value="Junio">Junio</option>
        <option value="Julio">Julio</option>
        <option value="Agosto">Agosto</option>
        <option value="Septiembre">Septiembre</option>
        <option value="Octubre">Octubre</option>
        <option value="Noviembre">Noviembre</option>
        <option value="Diciembre">Diciembre</option>
      </select>
    </div>
    <div class="top-bar-right">
      <button id="saveDataBtn" class="icon-btn" title="Guardar">
        <span class="material-symbols-rounded">save</span>
      </button>
      <button id="exportDataBtn" class="icon-btn" title="Exportar">
        <span class="material-symbols-rounded">download</span>
      </button>
      <button id="importDataBtn" class="icon-btn" title="Importar">
        <span class="material-symbols-rounded">upload</span>
      </button>
      <input type="file" id="importFileInput" accept=".json" style="display:none">
      <button id="addChannelBtn" class="btn-primary">
        <span class="material-symbols-rounded">add</span>
        Nuevo Canal
      </button>
    </div>
  </header>

  <main class="content">
    <section class="tier-list">
      <div class="tier-row" data-tier="S">
        <div class="tier-label tier-s">S</div>
        <div class="tier-dropzone" id="zone-S" data-zone="S"></div>
      </div>
      <div class="tier-row" data-tier="A">
        <div class="tier-label tier-a">A</div>
        <div class="tier-dropzone" id="zone-A" data-zone="A"></div>
      </div>
      <div class="tier-row" data-tier="B">
        <div class="tier-label tier-b">B</div>
        <div class="tier-dropzone" id="zone-B" data-zone="B"></div>
      </div>
      <div class="tier-row" data-tier="C">
        <div class="tier-label tier-c">C</div>
        <div class="tier-dropzone" id="zone-C" data-zone="C"></div>
      </div>
      <div class="tier-row" data-tier="D">
        <div class="tier-label tier-d">D</div>
        <div class="tier-dropzone" id="zone-D" data-zone="D"></div>
      </div>
    </section>

    <section class="unranked-section">
      <h2>Sin clasificar</h2>
      <div class="tier-dropzone unranked-zone" id="zone-unranked" data-zone="unranked"></div>
    </section>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="channelModal">
    <div class="modal" id="modalContent">
      <div class="modal-header">
        <h2 id="modalTitle">Agregar Canal</h2>
        <button class="icon-btn" id="closeModalBtn">
          <span class="material-symbols-rounded">close</span>
        </button>
      </div>
      <form id="channelForm">
        <input type="hidden" id="canalId">

        <div class="field">
          <label>Foto del canal</label>
          <div class="upload-area" id="photoUploadArea">
            <div class="upload-preview" id="photoPreviewContainer" style="display:none">
              <img id="photoPreview" alt="Preview">
              <button type="button" class="remove-photo" id="removePhotoBtn" title="Quitar">
                <span class="material-symbols-rounded">close</span>
              </button>
            </div>
            <div class="upload-prompt" id="photoUploadPrompt">
              <span class="material-symbols-rounded">add_photo_alternate</span>
              <span>Subir imagen</span>
              <small>PNG, JPG, WebP · máx 2MB</small>
            </div>
            <input type="file" id="canalFotoFile" accept="image/png,image/jpeg,image/webp" style="display:none">
            <input type="hidden" id="canalFoto">
          </div>
        </div>

        <div class="field">
          <label for="canalNombre">Nombre del canal</label>
          <input type="text" id="canalNombre" required placeholder="Ej. ElXokas">
        </div>
        <div class="field">
          <label for="canalNicho">Nicho</label>
          <input type="text" id="canalNicho" placeholder="Gaming, Tech...">
        </div>
        <div class="field">
          <label for="canalSubs">Suscriptores</label>
          <input type="text" id="canalSubs" placeholder="Ej. 1.2M">
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-danger" id="deleteChannelBtn" style="display:none">Eliminar</button>
          <button type="submit" class="btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
