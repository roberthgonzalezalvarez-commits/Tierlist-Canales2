<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tier List de Canales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
  <!-- Ambient background blobs -->
  <div class="ambient-light light-1"></div>
  <div class="ambient-light light-2"></div>
  <div class="ambient-light light-3"></div>

  <div class="app-container">
    <header class="glass-panel main-header">
      <div class="header-left">
        <h1>Rankings</h1>
        <div class="month-selector glass-input-group">
          <select id="monthSelect">
             <option value="Enero">Enero</option>
             <option value="Febrero">Febrero</option>
             <option value="Marzo">Marzo</option>
             <option value="Abril" selected>Abril</option>
             <option value="Mayo">Mayo</option>
             <option value="Junio">Junio</option>
             <option value="Julio">Julio</option>
             <option value="Agosto">Agosto</option>
             <option value="Septiembre">Septiembre</option>
             <option value="Octubre">Octubre</option>
             <option value="Noviembre">Noviembre</option>
             <option value="Diciembre">Diciembre</option>
          </select>
        </div>
      </div>
      <div class="header-right">
        <button id="saveDataBtn" class="glass-button save-btn" title="Guardar datos">
          <i class="ri-save-line"></i> Guardar
        </button>
        <button id="exportDataBtn" class="glass-button" title="Exportar como archivo">
          <i class="ri-download-2-line"></i>
        </button>
        <button id="importDataBtn" class="glass-button" title="Importar archivo">
          <i class="ri-upload-2-line"></i>
        </button>
        <input type="file" id="importFileInput" accept=".json" style="display:none">
        <button id="addChannelBtn" class="glass-button add-btn">
          <i class="ri-add-line"></i> Nuevo Canal
        </button>
      </div>
    </header>

    <main class="workspace">
      <section class="tier-list-container">
        <!-- Tiers will be generated by JS -->
        <div class="tier-row" data-tier="S">
          <div class="tier-label glass-panel tier-s">S</div>
          <div class="tier-dropzone glass-panel" id="zone-S" data-zone="S"></div>
        </div>
        <div class="tier-row" data-tier="A">
          <div class="tier-label glass-panel tier-a">A</div>
          <div class="tier-dropzone glass-panel" id="zone-A" data-zone="A"></div>
        </div>
        <div class="tier-row" data-tier="B">
          <div class="tier-label glass-panel tier-b">B</div>
          <div class="tier-dropzone glass-panel" id="zone-B" data-zone="B"></div>
        </div>
        <div class="tier-row" data-tier="C">
          <div class="tier-label glass-panel tier-c">C</div>
          <div class="tier-dropzone glass-panel" id="zone-C" data-zone="C"></div>
        </div>
        <div class="tier-row" data-tier="D">
          <div class="tier-label glass-panel tier-d">D</div>
          <div class="tier-dropzone glass-panel" id="zone-D" data-zone="D"></div>
        </div>
      </section>

      <section class="unranked-container glass-panel">
        <h2 class="unranked-title">Canales sin clasificar</h2>
        <div class="tier-dropzone unranked-dropzone" id="zone-unranked" data-zone="unranked"></div>
      </section>
    </main>
  </div>

  <!-- Modal for Add/Edit -->
  <div class="modal-overlay" id="channelModal">
    <div class="modal-content glass-panel liquid-modal">
      <div class="modal-header">
        <h2 id="modalTitle">Agregar Canal</h2>
        <button class="close-btn" id="closeModalBtn"><i class="ri-close-line"></i></button>
      </div>
      <form id="channelForm">
        <input type="hidden" id="canalId">
        
        <div class="form-group">
          <label for="canalFotoFile">Foto del canal (opcional)</label>
          <div class="photo-upload-area" id="photoUploadArea">
            <div class="photo-preview-container" id="photoPreviewContainer" style="display:none">
              <img id="photoPreview" class="photo-preview-img" alt="Preview">
              <button type="button" class="remove-photo-btn" id="removePhotoBtn" title="Quitar foto">
                <i class="ri-close-line"></i>
              </button>
            </div>
            <div class="photo-upload-prompt" id="photoUploadPrompt">
              <i class="ri-image-add-line"></i>
              <span>Arrastra una imagen aquí o haz clic para subir</span>
              <span class="photo-upload-hint">PNG, JPG, WebP — máx 2MB</span>
            </div>
            <input type="file" id="canalFotoFile" accept="image/png,image/jpeg,image/webp" style="display:none">
            <input type="hidden" id="canalFoto">
          </div>
        </div>
        <div class="form-group">
          <label for="canalNombre">Nombre del canal</label>
          <input type="text" id="canalNombre" class="glass-input" required placeholder="Ej. ElXokas">
        </div>
        <div class="form-group">
          <label for="canalNicho">Nicho o Categoría</label>
          <input type="text" id="canalNicho" class="glass-input" placeholder="Gaming, Tecnología...">
        </div>
        <div class="form-group">
          <label for="canalSubs">Suscriptores</label>
          <input type="text" id="canalSubs" class="glass-input" placeholder="Ej. 1.2M">
        </div>
        
        <div class="modal-actions">
           <button type="button" class="glass-button secondary" id="deleteChannelBtn" style="display: none;">Eliminar</button>
           <button type="submit" class="glass-button primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
